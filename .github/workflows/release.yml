name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential libopenblas-dev liblapack-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev \
            ffmpeg patchelf

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install cmake ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Python sidecar
        shell: bash
        run: |
          cd sidecar
          python3 -m venv .venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install -e ".[dev]"
          pip install -e ".[faces]" || echo "face_recognition skipped (dlib build failed)"

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Pickr v__VERSION__"
          releaseBody: "See the [release notes](https://github.com/aaron777collins/pickr/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }}
